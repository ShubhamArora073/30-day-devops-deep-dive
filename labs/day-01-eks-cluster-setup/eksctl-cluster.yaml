# Day-01 EKS cluster — DEV / sandbox variant. Cheap, reproducible by anyone.
#
# Apply:    eksctl create cluster -f eksctl-cluster.yaml
# Inspect:  eksctl get cluster -f eksctl-cluster.yaml
# Destroy:  eksctl delete cluster -f eksctl-cluster.yaml
#
# ─── DEV DESIGN CHOICES (optimised for cost + simplicity) ──────────────────
#   Endpoint   Public + Private — kubectl from anywhere, worker→API in VPC
#   HA         2 AZs, single NAT GW — cheap. Single-AZ NAT failure domain.
#   Nodes      1 managed nodegroup, t3.medium Spot, 2 desired
#   Logging    audit + authenticator only — minimal CloudWatch cost
#   Secrets    Default disk encryption only (no envelope encryption on Secrets)
#   Access     CONFIG_MAP only (legacy aws-auth ConfigMap) — simplest
# ───────────────────────────────────────────────────────────────────────────
#
# Going production? See the "Going Production" section in README.md and the
# eksctl-cluster.prod.yaml in this folder (gitignored; you'd recreate it
# locally from the README diff).

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: practice-cluster
  region: us-west-2
  version: "1.30"
  tags:
    Owner: shubham
    Purpose: devops-practice
    AutoDelete: "true"

# IRSA at creation — always on, even in dev. OIDC after-the-fact requires
# manual stack edits, so cheapest to enable now.
iam:
  withOIDC: true

vpc:
  cidr: "10.0.0.0/16"
  nat:
    gateway: Single                # 1 NAT GW (cheap, single-AZ failure domain)
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

cloudWatch:
  clusterLogging:
    enableTypes:
      - audit
      - authenticator
    logRetentionInDays: 7

managedNodeGroups:
  - name: ng-workload
    amiFamily: AmazonLinux2023
    instanceType: t3.medium
    spot: true
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 30
    volumeType: gp3
    privateNetworking: true
    labels:
      role: worker
      lifecycle: spot
    iam:
      withAddonPolicies:
        cloudWatch: true
        autoScaler: true

addons:
  - name: vpc-cni
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: eks-pod-identity-agent
    version: latest
