# Day-01 EKS cluster — declarative definition.
#
# Apply:    eksctl create cluster -f eksctl-cluster.yaml
# Inspect:  eksctl get cluster -f eksctl-cluster.yaml
# Destroy:  eksctl delete cluster -f eksctl-cluster.yaml
#
# Produces:
#   - 1 EKS control plane (AWS-managed, cross-account ENIs in your VPC)
#   - 1 VPC (10.0.0.0/16), 2 public + 2 private subnets across 2 AZs
#   - 1 NAT Gateway (single-AZ — cheap; mention "HA = multi-AZ in prod")
#   - 1 managed node group (3 × t3.medium spot)
#   - 4 EKS-managed add-ons (vpc-cni, coredns, kube-proxy, eks-pod-identity-agent)
#   - OIDC provider attached → IRSA enabled at creation time

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: practice-cluster
  region: us-west-2
  version: "1.30"                    # Pin K8s version — never "latest" in shared envs
  tags:
    Owner: shubham
    Purpose: devops-practice
    AutoDelete: "true"

# IRSA at creation. Adding OIDC after the fact requires manual stack edits.
iam:
  withOIDC: true

# Single NAT GW for cost; private endpoint kept ON so node→API stays inside VPC.
vpc:
  cidr: "10.0.0.0/16"
  nat:
    gateway: Single
  clusterEndpoints:
    publicAccess: true
    privateAccess: true
    # publicAccessCIDRs: ["1.2.3.4/32"]   # lock down to office IP in prod

# Control-plane logging — only audit + authenticator to keep CloudWatch cheap.
cloudWatch:
  clusterLogging:
    enableTypes: ["audit", "authenticator"]
    logRetentionInDays: 7

# Managed nodegroup. Managed > self-managed: AWS handles AMI patching and
# graceful drain on rolling updates. Spot for sandbox cost.
managedNodeGroups:
  - name: ng-default
    amiFamily: AmazonLinux2023
    instanceType: t3.medium
    spot: true
    desiredCapacity: 3
    minSize: 2
    maxSize: 4
    volumeSize: 30
    volumeType: gp3
    privateNetworking: true          # no public IPs on workers
    labels:
      role: worker
      lifecycle: spot
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/practice-cluster: "owned"
    iam:
      withAddonPolicies:
        cloudWatch: true
        autoScaler: true

# EKS-managed add-ons → version-locked to cluster, one-click upgrade path.
addons:
  - name: vpc-cni
    version: latest
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: eks-pod-identity-agent
    version: latest
